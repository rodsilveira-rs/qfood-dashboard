<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Q Food — Remuneração Variável</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1f2e;--sf:#242938;--s2:#2e3447;--s3:#353c52;
  --br:rgba(255,255,255,0.10);--b2:rgba(255,255,255,0.18);--b3:rgba(255,255,255,0.26);
  --tx:#eef1f8;--mu:#8fa0c0;--mu2:#5e718e;
  --red:#ff4d4f;--ok:#36cfa0;--warn:#ffaa2b;--blue:#4d8ef5;--pur:#a07cf6;
  --fh:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --fb:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);min-height:100vh;}

/* ---- HEADER ---- */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--br);background:var(--sf);position:sticky;top:0;z-index:100;}
.logo{height:52px;object-fit:contain;}
.hdr-c h1{font-family:var(--fh);font-size:1.15rem;font-weight:700;text-align:center;}
.hdr-c p{font-size:0.72rem;color:var(--mu);text-align:center;margin-top:2px;}
.dbadge{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:6px 14px;text-align:right;min-width:150px;}
.dbadge strong{display:block;font-family:var(--fh);font-size:0.9rem;}
.dbadge span{font-size:0.68rem;color:var(--mu);}

/* ---- TABS ---- */
.tabs{display:flex;gap:2px;padding:0 28px;background:var(--sf);border-bottom:1px solid var(--br);}
.tab{padding:13px 20px;font-size:0.84rem;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;}
.tab:hover{color:var(--tx);}
.tab.active{color:var(--tx);border-bottom-color:var(--red);font-weight:600;}

/* ---- MAIN ---- */
.page{display:none;padding:28px;max-width:1000px;margin:0 auto;}
.page.active{display:block;}

/* ---- SECTION ---- */
.sec{font-family:var(--fh);font-size:0.7rem;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--mu);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--br);}

/* ---- KPI GRID ---- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
.kpi{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:16px 18px;}
.kpi .lbl{font-size:0.74rem;color:var(--mu);margin-bottom:8px;letter-spacing:0.3px;}
.kpi .val{font-family:var(--fh);font-size:1.5rem;font-weight:700;line-height:1;}
.kpi .sub{font-size:0.73rem;color:var(--mu);margin-top:6px;}
.kpi .delta{font-size:0.7rem;margin-top:4px;font-weight:500;}
.kpi.r{border-color:var(--red);}.kpi.r .val{color:var(--red);}
.kpi.g{border-color:var(--ok);}.kpi.g .val{color:var(--ok);}
.kpi.w{border-color:var(--warn);}.kpi.w .val{color:var(--warn);}
.kpi.b{border-color:var(--blue);}.kpi.b .val{color:var(--blue);}
.kpi.p{border-color:var(--pur);}.kpi.p .val{color:var(--pur);}

/* ---- CHART WRAP ---- */
.cwrap{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:20px;margin-bottom:24px;}
.cwrap .ctitle{font-family:var(--fh);font-size:0.78rem;font-weight:600;margin-bottom:16px;color:var(--tx);}
.cleg{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;font-size:0.68rem;color:var(--mu);}
.cleg span{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 7px;border-radius:5px;transition:all .15s;user-select:none;border:1px solid transparent;}
.cleg span:hover{background:var(--s2);border-color:var(--br);}
.cleg span.off{opacity:.3;text-decoration:line-through;}
.cleg i{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0;}

/* ---- RANKING ---- */
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.rcard{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;}
.rnum{font-family:var(--fh);font-size:1.4rem;font-weight:800;color:var(--b2);width:24px;flex-shrink:0;line-height:1;}
.rnum.t1{color:#f59e0b;}.rnum.t2{color:#94a3b8;}.rnum.t3{color:#b45309;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.ri .rn{font-size:0.8rem;font-weight:500;}
.ri .rp{font-size:0.95rem;font-family:var(--fh);font-weight:700;}
.ri .rv{font-size:0.68rem;color:var(--mu);}

/* ---- TABLE ---- */
.twrap{background:var(--sf);border:1px solid var(--br);border-radius:12px;overflow:hidden;margin-bottom:24px;}
table{width:100%;border-collapse:collapse;}
th{font-size:0.7rem;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:0.8px;padding:8px 12px;text-align:left;border-bottom:1px solid var(--br);}
th:not(:first-child){text-align:right;}
td{padding:11px 14px;font-size:0.85rem;border-bottom:1px solid var(--br);vertical-align:middle;}
td:not(:first-child){text-align:right;}
tbody tr{cursor:pointer;transition:background 0.12s;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--s2);}
.vc{display:flex;align-items:center;gap:10px;}
.mav{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;flex-shrink:0;}
.bm{height:4px;border-radius:2px;background:var(--br);overflow:hidden;margin-top:4px;}
.bmf{height:100%;border-radius:2px;}
.pv{font-family:var(--fh);font-weight:700;font-size:0.85rem;}
.tag{display:inline-block;font-size:0.62rem;padding:2px 6px;border-radius:20px;font-weight:500;}
.tg{background:rgba(54,207,160,0.18);color:#36cfa0;}
.tr{background:rgba(255,77,79,0.18);color:#ff7875;}
.ty{background:rgba(255,170,43,0.18);color:#ffaa2b;}
.tb{background:rgba(77,142,245,0.18);color:#74a9ff;}
.ch{font-size:0.62rem;color:var(--mu);margin-top:1px;}

/* ---- CEO SECTION ---- */
.ceo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px;}
.ceo-card{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:16px 18px;}
.ceo-card .cc-title{font-size:0.68rem;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:600;}

/* ---- SOP TABLE ---- */
.sop-table-wrap{background:var(--sf);border:1px solid var(--br);border-radius:12px;overflow:hidden;margin-bottom:24px;}
.generic-row{display:grid;gap:8px;padding:10px 16px;border-bottom:1px solid var(--br);font-size:0.8rem;align-items:center;}
.generic-row:last-child{border-bottom:none;}
.generic-row.hdr-row{font-size:0.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.8px;font-weight:500;background:var(--s2);}

/* ---- LOADING / ERROR ---- */
.spin-wrap{text-align:center;padding:80px 20px;color:var(--mu);}
.spin{width:28px;height:28px;border:2px solid var(--b2);border-top-color:var(--red);border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto 14px;}
@keyframes sp{to{transform:rotate(360deg);}}
.errmsg{background:rgba(230,51,41,0.08);border:1px solid rgba(230,51,41,0.25);border-radius:8px;padding:12px 16px;color:#ef4444;font-size:0.8rem;margin:16px 28px;display:none;}

/* ---- MODAL ---- */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:1000;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.ov.open{display:flex;}
.modal{background:var(--sf);border:1px solid var(--b2);border-radius:16px;width:100%;max-width:680px;padding:24px;position:relative;margin:auto;}
.mclose{position:absolute;top:14px;right:14px;background:var(--s2);border:1px solid var(--br);color:var(--mu);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.mclose:hover{color:var(--tx);border-color:var(--b2);}
.mhdr{display:flex;align-items:center;gap:14px;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--br);}
.mav2{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;}
.mn{font-family:var(--fh);font-size:1.2rem;font-weight:700;}
.ms{font-size:0.75rem;color:var(--mu);margin-top:2px;}
.msec{margin-bottom:18px;}
.msect{font-size:0.65rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.msect::after{content:'';flex:1;height:1px;background:var(--br);}
.mg3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.mc{background:var(--bg);border-radius:10px;padding:11px 13px;}
.mc .ml{font-size:0.65rem;color:var(--mu);margin-bottom:3px;}
.mc .mv{font-family:var(--fh);font-size:1rem;font-weight:700;}
.tr2{background:var(--bg);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.tr2 .tl{font-size:0.72rem;color:var(--mu);}
.tr2 .tv{font-family:var(--fh);font-size:0.95rem;font-weight:700;}
.pbw{background:var(--bg);border-radius:10px;padding:13px;}
.pbl{display:flex;justify-content:space-between;font-size:0.72rem;margin-bottom:7px;}
.pbb{height:10px;background:var(--br);border-radius:5px;overflow:hidden;margin-bottom:10px;}
.pbf{height:100%;border-radius:5px;}
.pg4{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.ps{background:var(--bg);border-radius:8px;padding:9px 11px;}
.ps .psl{font-size:0.62rem;color:var(--mu);margin-bottom:2px;}
.ps .psv{font-size:0.9rem;font-weight:700;font-family:var(--fh);}
.sp2{background:var(--bg);border-radius:10px;padding:13px;margin-bottom:8px;}
.sp2t{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
.sp2b{height:7px;background:var(--b2);border-radius:4px;overflow:hidden;margin-bottom:7px;}
.sp2f{height:100%;border-radius:4px;}
.sp2v{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--mu);}

/* ---- AVATAR COLORS ---- */
.avLB{background:rgba(59,130,246,0.2);color:#60a5fa;}
.avVS{background:rgba(6,214,160,0.2);color:#06d6a0;}
.avDN{background:rgba(245,158,11,0.2);color:#f59e0b;}
.avEM{background:rgba(167,139,250,0.2);color:#a78bfa;}
.avED{background:rgba(249,115,22,0.2);color:#fb923c;}
.avCG{background:rgba(230,51,41,0.2);color:#ef4444;}
.avCC{background:rgba(16,185,129,0.2);color:#10b981;}
.avKE{background:rgba(99,102,241,0.2);color:#818cf8;}
.avDE{background:rgba(20,184,166,0.2);color:#2dd4bf;}

/* ---- FOOTER ---- */
.ftr{text-align:center;font-size:0.68rem;color:var(--mu2);padding:20px 28px;border-top:1px solid var(--br);}
.home-overlay{position:fixed;inset:0;background:var(--bg);z-index:8000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.home-overlay.open{display:flex;}
.home-welcome{font-family:var(--fh);font-size:1.5rem;font-weight:700;color:var(--tx);margin-bottom:6px;text-align:center;}
.home-sub{font-size:0.85rem;color:var(--mu);margin-bottom:40px;text-align:center;}
.home-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;width:100%;max-width:1100px;}
.home-btn{background:var(--sf);border:1px solid var(--br);border-radius:16px;padding:28px 20px;cursor:pointer;text-align:center;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:10px;}
.home-btn:hover{border-color:var(--b2);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.25);}
.home-btn .hb-icon{font-size:2rem;line-height:1;}
.home-btn .hb-title{font-family:var(--fh);font-size:0.95rem;font-weight:700;color:var(--tx);}
.home-btn .hb-sub{font-size:0.7rem;color:var(--mu);line-height:1.5;}
.home-btn.hb-com{border-top:3px solid #4d8ef5;}
.home-btn.hb-fin{border-top:3px solid #36cfa0;}
.home-btn.hb-log{border-top:3px solid #ffaa2b;}
.home-btn.hb-adm{border-top:3px solid #ff4d4f;}
.home-btn.hb-cmp{border-top:3px solid #a07cf6;}
.cmp-qty{width:70px;background:var(--s2);border:1px solid var(--br);border-radius:6px;padding:5px 8px;color:var(--tx);font-size:.82rem;text-align:center;outline:none;}
.cmp-qty:focus{border-color:#a07cf6;}
.val-sel{background:var(--s2);border:1px solid var(--br);border-radius:6px;padding:4px 8px;color:var(--tx);font-size:.78rem;outline:none;}
.val-sel:focus{border-color:#a07cf6;}
.giro-tag{padding:2px 7px;border-radius:4px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.giro-alto{background:rgba(54,207,160,.15);color:#36cfa0;border:1px solid rgba(54,207,160,.3);}
.giro-normal{background:rgba(143,160,192,.1);color:#8fa0c0;border:1px solid rgba(143,160,192,.2);}
.admin-overlay{position:fixed;inset:0;background:var(--bg);z-index:7000;display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:32px;overflow-y:auto;}
.admin-overlay.open{display:flex;}
.admin-header{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px;margin-bottom:28px;}
.admin-back{background:var(--s2);border:1px solid var(--br);color:var(--mu);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:0.82rem;}
.lal-act-btn{padding:3px 9px;border:1px solid var(--br);border-radius:6px;font-size:.7rem;cursor:pointer;font-weight:500;white-space:nowrap;background:var(--s2);color:var(--mu);margin-left:4px;}
.lal-act-btn:hover{border-color:var(--b2);color:var(--tx);}
.lal-act-btn.ai{border-color:rgba(160,124,246,.4);color:#a07cf6;background:rgba(160,124,246,.08);}
.lal-act-btn.chart{border-color:rgba(77,142,245,.4);color:#4d8ef5;background:rgba(77,142,245,.08);}
.lal-ai-box{background:rgba(160,124,246,.08);border:1px solid rgba(160,124,246,.25);border-radius:8px;padding:12px 16px;margin:8px 0;font-size:.82rem;}
@media(max-width:900px){.home-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:600px){.home-grid{grid-template-columns:repeat(2,1fr);}}


/* Readable font for large numbers */
.kpi .val,.kpi .sub,.kpi .lbl,
#tend-card *,
.rp,.rv,.ri .rp,
.mc .mv,
.tr2 .tv,
.sp2t span,
#tend-meta-dia,#tend-media-atual,#tend-projecao,#tend-ritmo{
  font-family:var(--fb) !important;
  letter-spacing:-0.3px;
}
.kpi .val{font-size:1.6rem !important; font-weight:600 !important;}
@media(max-width:680px){
  .kpis{grid-template-columns:repeat(2,1fr);}
  .rgrid{grid-template-columns:1fr 1fr;}
  .ceo-grid{grid-template-columns:1fr;}
  .pg4{grid-template-columns:repeat(2,1fr);}
  .tabs{overflow-x:auto;}
  .tab{font-size:0.72rem;padding:10px 14px;}
  .hdr{padding:14px 16px;}
  .page{padding:16px;}
}

.login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#151929,#1e2438);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:#242938;border:1px solid rgba(255,255,255,0.14);border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 12px 48px rgba(0,0,0,0.5);}
.login-logo{display:flex;justify-content:center;margin-bottom:28px;}
.login-logo img{height:60px;object-fit:contain;}
.login-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;text-align:center;color:#f0f4ff;margin-bottom:6px;}
.login-sub{font-size:0.78rem;color:#6b7ea8;text-align:center;margin-bottom:28px;}
.login-label{font-size:0.72rem;color:#6b7ea8;margin-bottom:6px;display:block;letter-spacing:0.3px;}
.login-input{width:100%;background:#1a1f2e;border:1px solid rgba(255,255,255,0.14);border-radius:10px;padding:12px 14px;color:#eef1f8;font-size:0.95rem;font-size:0.88rem;margin-bottom:14px;font-family:'DM Sans',sans-serif;outline:none;}
.login-input:focus{border-color:#e63329;}
.login-btn{width:100%;background:#e63329;border:none;border-radius:10px;padding:12px;color:#fff;font-size:0.9rem;font-weight:600;font-family:'Syne',sans-serif;cursor:pointer;letter-spacing:0.3px;margin-top:4px;}
.login-btn:hover{background:#c42820;}
.login-err{font-size:0.78rem;color:#ef4444;text-align:center;margin-top:10px;min-height:20px;}
.login-footer{font-size:0.68rem;color:#6b7ea8;text-align:center;margin-top:20px;}

/* Ajustes específicos desta página */
.page{display:block;padding:28px;max-width:1100px;margin:0 auto;}
.sec{font-family:var(--fh);font-size:0.7rem;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--mu);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--br);}

/* Spinner */
.spin-wrap{display:flex;align-items:center;gap:10px;padding:20px;color:var(--mu);font-size:.85rem;}
.spin{width:18px;height:18px;border:2px solid var(--br);border-top-color:var(--tx);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px;}
.kpi{background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:16px 18px;}
.kpi .lbl{font-size:0.74rem;color:var(--mu);margin-bottom:8px;letter-spacing:0.3px;}
.kpi .val{font-family:var(--fh);font-size:1.5rem;font-weight:700;line-height:1;}

/* Header desta página */
.page-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--br);background:var(--sf);position:sticky;top:0;z-index:100;}
.page-hdr .logo{height:44px;object-fit:contain;}
.page-hdr .titulo{font-family:var(--fh);font-size:1.1rem;font-weight:700;}
.page-hdr .subt{font-size:0.7rem;color:var(--mu);margin-top:2px;}
.page-hdr .user{font-size:0.72rem;color:var(--mu);padding:0 8px;}
.page-hdr button{background:var(--s2);border:1px solid var(--br);color:var(--mu);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:0.76rem;font-weight:500;}
.page-hdr button:hover{background:var(--s3);color:var(--tx);}
.hdr-actions{display:flex;gap:8px;align-items:center;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="page-hdr">
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="logo.png" class="logo" alt="Q Food Company" onerror="this.style.display='none'">
    <div>
      <div class="titulo">💰 Remuneração Variável</div>
      <div class="subt">Q Food Company · Comissões e bônus dos vendedores</div>
    </div>
  </div>
  <div class="hdr-actions">
    <span class="user" id="user-info">—</span>
    <button onclick="location.href='Index_Menu.html'">🏠 Menu</button>
    <button onclick="logout()">Sair</button>
  </div>
</div>

<!-- CONTEÚDO DA ABA REMUNERAÇÃO (extraído do sistema original) -->
<div id="tab-remuneracao" class="page active" style="display:block">
  <div class="sec">Remuneracao variavel</div>
  <div id="rem-loading" class="spin-wrap"><div class="spin"></div>Carregando...</div>
  <div id="rem-content" style="display:none">
    <!-- ADMIN: selector -->
    <div id="rem-selector" style="display:none;margin-bottom:20px;">
      <div style="font-size:0.78rem;color:var(--mu);margin-bottom:8px;">Selecionar vendedor:</div>
      <div id="rem-btns" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>
    <!-- Card principal -->
    <div id="rem-card"></div>
  </div>
</div>

<script>

// Helper: pega os dados de um vendedor em um mês específico do histórico
function getDadosHistorico(nome, mesChave){
  var bloco = HISTORICO_REMUNERACAO.find(function(h){ return h.mes === mesChave; });
  if(!bloco) return null;
  var raw = bloco.dados.find(function(d){ return d.nome.toLowerCase() === nome.toLowerCase(); });
  if(!raw) return null;
  // Retorna no MESMO formato que getRemData() retorna (compatibilidade total com calcRemuneracao)
  return {
    nome: raw.nome,
    faturamento: raw.faturamento,
    meta_fat: raw.meta_fat,
    pct_fat: raw.pct_fat,
    margem: raw.margem,
    posit_pct: raw.posit_pct,
    novos: raw.novos,

    tipo: raw.tipo,
    over_meta: raw.over_meta,
    meta_global: raw.meta_global,
    mes: bloco.label,
    observacao: ""
  };
}

// Acumulado anual: soma todos os prêmios de todos os meses do histórico para um vendedor
function getAcumuladoAno(nome, ano){
  ano = ano || (new Date().getFullYear());
  var prefixo = String(ano) + "-";
  var totalPremio = 0;
  var totalFat = 0;
  var totalMeta = 0;
  var mesesContados = 0;
  HISTORICO_REMUNERACAO.forEach(function(h){
    if(h.mes.indexOf(prefixo) === 0){
      var d = h.dados.find(function(x){ return x.nome.toLowerCase() === nome.toLowerCase(); });
      if(d){
        totalPremio += d.premio_sheet || 0;
        totalFat += d.faturamento || 0;
        totalMeta += d.meta_fat || 0;
        mesesContados++;
      }
    }
  });
  return { premio: totalPremio, faturamento: totalFat, meta: totalMeta, meses: mesesContados };
}

// Helpers de formatacao do sistema antigo
function fv(v){
  var n=Math.abs(parseFloat(v)||0);
  return "R$ "+n.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function parseBR(v){
  if(v===null || v===undefined || v==="" || v==="-") return 0;
  // Aceita number direto
  if(typeof v === "number") return v;
  var s=String(v).trim();
  if(!s || s==="-") return 0;

  // Detecta marcadores de formato ANTES de qualquer remoção
  var isPercent = s.indexOf("%")>-1;
  var isCurrency = s.indexOf("R$")>-1 || s.toLowerCase().indexOf("r$")>-1;

  // Remove tudo que nao for digito, virgula, ponto ou sinal de menos
  s = s.replace(/[Rr]\$/g, "").replace(/[^\d,.\-]/g, "").trim();
  if(!s) return 0;

  // Determina separador decimal:
  // - Brazilian: 1.234.567,89  (ponto = milhar, virgula = decimal)
  // - English:   1,234,567.89  (virgula = milhar, ponto = decimal)
  // Heuristica: o ULTIMO separador eh o decimal.
  var lastComma = s.lastIndexOf(",");
  var lastDot   = s.lastIndexOf(".");
  if(lastComma>-1 && lastDot>-1){
    if(lastComma > lastDot){
      // Formato BR: 1.234,56
      s = s.replace(/\./g, "").replace(",", ".");
    } else {
      // Formato EN: 1,234.56
      s = s.replace(/,/g, "");
    }
  } else if(lastComma>-1){
    // So tem virgula -> decimal BR
    s = s.replace(",", ".");
  }
  // (so tem ponto -> ja eh decimal en, deixa como esta)

  var n = parseFloat(s);
  if(isNaN(n)) return 0;

  // Se for moeda (R$), retorna direto sem converter
  if(isCurrency) return n;

  // Se for percentual explicito (com sinal %), retorna como esta (ex: "30%" -> 30)
  if(isPercent) return n;

  // Sem marcador: heuristica para decimal puro vindo do Sheets
  // Sheets exporta percentuais como decimal: 0.0125 (1.25%) ou 0.7 (70%)
  // Se 0 < n <= 1.5 sem marcador algum, multiplica por 100 (interpreta como %)
  // Exclui 0 (e' 0%, nao precisa converter) e numeros >1.5 (sao valores absolutos como qtde)
  if(n>0 && n<=1.5){
    n = n * 100;
  }
  return n;
}
function pc(a,b){return b>0?Math.round((a/b)*100):0;}
function cl(v,a,b){return Math.min(Math.max(v,a),b);}
function cp(p){if(p>=100)return"#10b981";if(p>=80)return"#3b82f6";if(p>=60)return"#f59e0b";return"#e63329";}

}


// Parser CSV robusto (RFC 4180) — suporta aspas, virgulas dentro de campos, e aspas duplas escapadas
function csv(txt){
  // Normaliza quebras de linha (Windows, Mac, Unix)
  txt = txt.replace(/\r\n/g, "\n").replace(/\r/g, "\n").trim();

  // Parser que respeita aspas e escapes RFC 4180
  var rows = [];
  var curRow = [];
  var curField = "";
  var inQuotes = false;

  for(var i = 0; i < txt.length; i++){
    var c = txt[i];
    var next = txt[i+1];

    if(inQuotes){
      if(c === '"'){
        if(next === '"'){ // aspas duplas escapadas dentro de campo
          curField += '"';
          i++;
        } else {
          inQuotes = false;
        }
      } else {
        curField += c;
      }
    } else {
      if(c === '"'){
        inQuotes = true;
      } else if(c === ','){
        curRow.push(curField);
        curField = "";
      } else if(c === '\n'){
        curRow.push(curField);
        rows.push(curRow);
        curRow = [];
        curField = "";
      } else {
        curField += c;
      }
    }
  }
  // Ultimo campo da ultima linha
  if(curField.length > 0 || curRow.length > 0){
    curRow.push(curField);
    rows.push(curRow);
  }

  if(rows.length === 0) return [];

  // Primeira linha = cabecalho
  var hdr = rows[0].map(function(h){ return String(h).trim(); });

  // Converte cada linha seguinte em objeto usando o cabecalho
  return rows.slice(1).map(function(row){
    var o = {};
    hdr.forEach(function(h, i){
      o[h] = (row[i] !== undefined) ? String(row[i]).trim() : "";
    });
    return o;
  }).filter(function(r){
    // Remove linhas totalmente vazias
    return Object.values(r).some(function(v){ return v !== ""; });
  });
}

// Carrega Meta Mensal pra ter DM disponivel
async function loadMeta(){
  try{
    var r = await fetch(UM + "&t=" + Date.now());
    if(!r.ok) return;
    var txt = await r.text();
    if(txt.trim().startsWith("<")) return;
    var rows = csv(txt);
    DM = rows.map(function(o){
      // A planilha Meta tem colunas: nome, meta, realizado
      var nome = (o["nome"] || o["Nome"] || o["NOME"] || "").trim();
      // Normaliza primeira letra maiuscula pra bater com SG
      if(nome) nome = nome.charAt(0).toUpperCase() + nome.slice(1).toLowerCase();
      var sigla = SG[nome] || "";
      return {
        nome: nome,
        sigla: sigla,
        av: AV[sigla] || "avLB",
        meta: parseBR(o["meta"] || o["Meta"] || "0"),
        real: parseBR(o["realizado"] || o["Realizado"] || o["real"] || o["Real"] || "0")
      };
    }).filter(function(v){return v.nome;});
    console.log("[DIAG] DM carregado:", DM.length, "vendedores -", DM.map(function(v){return v.nome;}).join(","));
  } catch(e){
    console.warn("Erro ao carregar meta:", e);
  }
}

var URL_REM = UR; // set from sheet URL above

async function loadRemuneracao(){
  document.getElementById("rem-loading").style.display="block";
  document.getElementById("rem-content").style.display="none";
  try{
    var r=await fetch(UR + "&t=" + Date.now());
    if(r.ok){
      var txt=await r.text();
      if(!txt.trim().startsWith("<")){
        // A planilha Remuneracao tem 2 linhas de titulo antes do cabecalho real.
        // Detecta automaticamente a linha que comeca com "Vendedor" e usa ela como header.
        var allLines = txt.split("\n");
        var headerIdx = 0;
        for(var i=0; i<Math.min(5, allLines.length); i++){
          if(allLines[i].toLowerCase().indexOf("vendedor") === 0){
            headerIdx = i;
            break;
          }
        }
        if(headerIdx > 0){
          // Reconstroi o CSV sem as linhas de titulo
          txt = allLines.slice(headerIdx).join("\n");
        }
        DR = csv(txt);
        console.log("[DIAG] DR carregado:", DR.length, "linhas. Colunas:", DR[0] ? Object.keys(DR[0]).join(" | ") : "(vazio)");
      }
    }
  }catch(e){ console.warn("Remuneracao CSV error:",e.message); }
  remLoaded=true;
  buildRemuneracao();
  document.getElementById("rem-loading").style.display="none";
  document.getElementById("rem-content").style.display="block";
}

// Helper: normaliza string (remove acentos + lowercase + trim) para comparar nomes de coluna
function _norm(s){
  return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
}
// Helper: pega o valor de uma coluna aceitando variacoes de acentos/maiusculas
// Tenta cada hint em ordem, comparando a forma normalizada com as chaves disponiveis
function _getCol(row){
  var hints = Array.prototype.slice.call(arguments, 1);
  var keys = Object.keys(row);
  for(var h=0; h<hints.length; h++){
    var nh = _norm(hints[h]);
    for(var k=0; k<keys.length; k++){
      if(_norm(keys[k]) === nh) return row[keys[k]];
    }
    // Se nao achou match exato, tenta match parcial (contains)
    for(var k=0; k<keys.length; k++){
      if(_norm(keys[k]).indexOf(nh) >= 0) return row[keys[k]];
    }
  }
  return "";
}

function getRemData(nome){
  // Tenta pegar os dados do CSV (planilha Remuneracao)
  // A planilha tem acentos/cedilha/quebras de linha nos cabecalhos. Usamos _getCol() tolerante.
  if(DR && DR.length>0){
    var row=DR.find(function(r){
      var v = _getCol(r, "Vendedor", "nome");
      return v.toString().toLowerCase().trim()===nome.toLowerCase().trim();
    });
    if(row){
      var result = {
        nome: nome,
        faturamento: parseBR(_getCol(row, "Faturamento Realizado", "Faturamento\nRealizado", "faturamento") || "0"),
        meta_fat: parseBR(_getCol(row, "Meta Faturamento", "Meta\nFaturamento", "meta_fat", "meta") || "0"),
        pct_fat: parseBR(_getCol(row, "% Fat vs Meta", "% Fat\nvs Meta") || "0"),
        margem: parseBR(_getCol(row, "Margem %", "Margem\n%", "Margem", "margem") || "0"),
        posit_pct: parseBR(_getCol(row, "Positivação %", "Positivação\n%", "Positivacao %", "posit_pct", "positivacao") || "0"),
        novos: parseInt(String(_getCol(row, "Novos Clientes", "Novos\nClientes", "novos") || "0").replace(/[^0-9]/g,""))||0,
        trocas_pct: parseBR(_getCol(row, "Trocas %", "Trocas\n%", "trocas_pct", "trocas") || "0"),
        // Pilares ja calculados pela planilha (% para P1-P3, R$ para P4 - pode variar)
        p1_fat:    parseBR(_getCol(row, "P1 Fat%", "P1\nFat%") || "0"),
        p2_marg:   parseBR(_getCol(row, "P2 Marg%", "P2\nMarg%") || "0"),
        p3_posit:  parseBR(_getCol(row, "P3 Posit%", "P3\nPosit%") || "0"),
        p4_novos:  parseBR(_getCol(row, "P4 Novos%", "P4\nNovos%") || "0"),
        total_pct: parseBR(_getCol(row, "Total %", "Total\n%", "total_pct") || "0"),
        premio_sheet: parseBR(_getCol(row, "Prêmio R$", "Prêmio\nR$", "Premio R$", "premio") || "0"),
        tipo: _getCol(row, "Tipo Regra", "Tipo\nRegra", "tipo") || "padrao",
        // Bonus da planilha (R$ direto)
        over_meta:    parseBR(_getCol(row, "OVER META", "Over Meta", "over_meta") || "0"),
        meta_global:  parseBR(_getCol(row, "META GLOBAL", "Meta Global", "meta_global") || "0"),
        mes: _getCol(row, "Mês/Ano", "Mes/Ano", "mes") || "",
        observacao: _getCol(row, "Observação", "Observa", "observacao") || ""
      };
      console.log("[DIAG] getRemData("+nome+"):", JSON.stringify(result));
      return result;
    }
    console.warn("[DIAG] getRemData("+nome+"): vendedor nao encontrado no DR");
  }
  // Fallback: usa dados do DM (Meta Mensal) quando DR nao tem o vendedor
  var dm=DM.find(function(v){return v.nome&&v.nome.toLowerCase()===nome.toLowerCase();});
  return {
    nome:nome,
    faturamento:dm?dm.real:0,
    meta_fat:dm?dm.meta:0,
    pct_fat:0,
    margem:0,
    posit_pct:0,
    novos:0,
    trocas_pct:0,
    p1_fat:0, p2_marg:0, p3_posit:0, p4_novos:0,
    total_pct:0, premio_sheet:0,
    tipo:"padrao",
    over_meta:0, meta_global:0,
    mes:"",
    observacao:""
  };
}

// calcRemuneracao — agora SO LE da planilha. Sem recalcular nada.
// ════════════════════════════════════════════════════════════════════
function calcRemuneracao(d){
  var perfil = PERFIL_VENDEDOR[d.nome] || "PJ";
  var regras = REGRAS_TXT[perfil] || REGRAS_TXT.PJ;
  var fat = d.faturamento;
  var meta = d.meta_fat;
  var pctFat = d.pct_fat>0 ? d.pct_fat : (meta>0?Math.round((fat/meta)*100):0);

  var pilares=[];

  if(perfil === "DEANE"){
    // Apenas pilar Margem (planilha calcula).
    // ATENCAO: a planilha pode colocar o valor calculado em P1 ou P2.
    // Pegamos o que estiver entre 0 e 5 (faixa valida de pilar).
    var p1raw = d.p1_fat, p2raw = d.p2_marg;
    var p1ok = (p1raw>0 && p1raw<=5);
    var p2ok = (p2raw>0 && p2raw<=5);
    var pMarg = p2ok ? p2raw : (p1ok ? p1raw : 0);
    pilares.push({
      nome:"Margem",
      pct: pMarg,
      desc: pMarg>0
        ? "Faixa atingida ("+formatPct(d.margem)+") = "+formatPct(pMarg)
        : "Abaixo do mínimo ("+formatPct(d.margem)+") = 0%",
      ok: pMarg>0,
      base: fat,
      valor: fat*(pMarg/100),
      regra: regras.marg,
      tipoMetrica: "marg",
      valorMetrica: d.margem
    });
    // Pilar Novos Clientes (R$ fixo da planilha)
    var p4r = d.p4_novos;
    pilares.push({
      nome:"Novos Clientes",
      pct: 0,
      desc: p4r>0 ? d.novos+" abertura(s) → R$ "+formatNum(p4r) : "Abaixo do mínimo ("+d.novos+" aberturas) = R$ 0",
      ok: p4r>0,
      base: 0,
      valor: p4r,
      tipo:"reais",
      regra: regras.novos,
      tipoMetrica: "novos",
      valorMetrica: d.novos
    });
  } else if(perfil === "KA-PJ"){
    // Claudia — 4 pilares (Fat, Margem≥45%, Trocas, Positivacao)
    var p1raw = d.p1_fat;
    var p1Contam = !(p1raw>=0 && p1raw<=5);
    var p1 = p1Contam ? 0 : p1raw;
    pilares.push({
      nome:"Faturamento",
      pct: p1,
      desc: p1Contam
        ? "Valor inválido na planilha ("+formatPct(p1raw)+") — usando Total final"
        : (p1>0 ? "Comissão fixa = "+formatPct(p1) : "Sem comissão"),
      ok: p1>0,
      base: fat, valor: fat*(p1/100),
      regra: regras.fat,
      tipoMetrica: "fat",
      valorMetrica: pctFat
    });
    var p2raw = d.p2_marg;
    var p2Contam = !(p2raw>=0 && p2raw<=5);
    var p2 = p2Contam ? 0 : p2raw;
    pilares.push({
      nome:"Margem ≥ 45%",
      pct: p2,
      desc: p2Contam
        ? "Valor inválido na planilha ("+formatPct(p2raw)+") — usando Total final"
        : (p2>0 ? "Margem ("+formatPct(d.margem)+") atingiu meta = "+formatPct(p2) : "Margem ("+formatPct(d.margem)+") < 45% = 0%"),
      ok: p2>0,
      base: fat, valor: fat*(p2/100),
      regra: regras.marg,
      tipoMetrica: "marg",
      valorMetrica: d.margem
    });
    // Trocas: nao tem coluna direta, exibe pelo % de trocas
    var pT = 0; var pTok = false; var pTdesc="";
    if(d.trocas_pct<=2){ pT=0.5; pTok=true; pTdesc="Trocas "+formatPct(d.trocas_pct)+" ≤ 2% = 0,50%"; }
    else if(d.trocas_pct<=5){ pT=0.25; pTok=true; pTdesc="Trocas "+formatPct(d.trocas_pct)+" entre 2-5% = 0,25%"; }
    else { pT=0; pTdesc="Trocas "+formatPct(d.trocas_pct)+" > 5% — sem prêmio"; }
    pilares.push({
      nome:"Trocas/Avarias",
      pct: pT,
      desc: pTdesc,
      ok: pTok,
      base: fat, valor: fat*(pT/100),
      regra: regras.trocas,
      tipoMetrica: "trocas",
      valorMetrica: d.trocas_pct
    });
    var p3raw = d.p3_posit;
    var p3Contam = !(p3raw>=0 && p3raw<=5);
    var p3 = p3Contam ? 0 : p3raw;
    pilares.push({
      nome:"Positivação ≥ 80%",
      pct: p3,
      desc: p3Contam
        ? "Valor inválido na planilha ("+formatPct(p3raw)+") — usando Total final"
        : (p3>0 ? "Positivação ("+formatPct(d.posit_pct)+") ≥ 80% = "+formatPct(p3) : "Positivação ("+formatPct(d.posit_pct)+") < 80% = 0%"),
      ok: p3>0,
      base: fat, valor: fat*(p3/100),
      regra: regras.posit,
      tipoMetrica: "posit",
      valorMetrica: d.posit_pct
    });
  } else {
    // PJ ou CLT — leitura direta dos pilares calculados pela planilha
    // ATENCAO: Quando o vendedor CLT nao bate gates (Fat<70% ou Posit<70%),
    // a planilha pode trazer P1/P2/P3 com valores brutos (margem, posit, etc.)
    // mas o Total% e Premio R$ ficam zerados. Detectamos isso para nao exibir
    // pilares com valores errados.
    var planilhaZerou = (d.total_pct === 0 && d.premio_sheet === 0);

    // SANITY CHECK: pilar individual > 5% indica "pilar contaminado"
    // (nenhum pilar real paga mais que 3%). Se acontece, a celula da planilha
    // contem dado bruto (margem, posit, fat%) em vez do pilar calculado.
    function pilarValido(v){ return v >= 0 && v <= 5; }
    var p1Contam = !pilarValido(d.p1_fat);
    var p2Contam = !pilarValido(d.p2_marg);
    var p3Contam = !pilarValido(d.p3_posit);
    var algumContam = p1Contam || p2Contam || p3Contam;

    // ── INFERÊNCIA DE PILARES (quando há contaminação + premio>0) ──
    // Reaplica as faixas de TIERS para deduzir o que cada pilar PAGOU,
    // baseado nos valores reais (margem, posit, fat) e no perfil (PJ/CLT).
    // Ex: Eliane CLT margem 29% bateu faixa 28-29% = 0,75% → R$ 2.073,64
    var p1Inferido = null, p2Inferido = null, p3Inferido = null;
    var inferiu = false;
    if(algumContam && !planilhaZerou && d.premio_sheet>0){
      // Para CLT: precisa bater gates Fat≥70% e Posit≥70%. Se bateu, calcula margem.
      // Para PJ:  cada pilar e' independente.
      var bateuGateCLT = (perfil==="CLT" && pctFat>=70 && d.posit_pct>=70);

      if(perfil==="CLT"){
        // Faturamento e Positivação não pagam — são gates.
        // Se bateu gate, mostra como passou; se nao, fica vermelho.
        p1Inferido = { pct:0, ok:bateuGateCLT, gate:true, motivo: bateuGateCLT
          ? "Gate Fat ≥70% atingido ("+formatPct(pctFat)+") — libera pilares"
          : "Faturamento "+formatPct(pctFat)+" abaixo do gate de 70%" };
        p3Inferido = { pct:0, ok:bateuGateCLT, gate:true, motivo: bateuGateCLT
          ? "Gate Posit ≥70% atingido ("+formatPct(d.posit_pct)+") — libera pilares"
          : "Positivação "+formatPct(d.posit_pct)+" abaixo do gate de 70%" };
        // Margem: se bateu gate, deduz pela faixa CLT
        if(bateuGateCLT){
          var pctMargCLT = 0;
          if(d.margem>=30) pctMargCLT = 1;
          else if(d.margem>=28) pctMargCLT = 0.75;
          else pctMargCLT = 0.5; // <27% (ainda assim libera 0,5% por gate batido)
          p2Inferido = { pct:pctMargCLT, ok:pctMargCLT>0, gate:false, motivo: "Margem "+formatPct(d.margem)+" → "+formatPct(pctMargCLT)+" sobre faturamento" };
        } else {
          p2Inferido = { pct:0, ok:false, gate:false, motivo: "Margem "+formatPct(d.margem)+" — sem gate liberado" };
        }
      } else if(perfil==="PJ"){
        // PJ: pilares independentes.
        // Faturamento PJ: 1% sobre todo faturamento (regra fixa do PDF Lucas/Vera/Eder/Kenyo)
        p1Inferido = { pct:1, ok:true, gate:false, motivo: "1,00% sobre faturamento" };
        // Margem PJ
        var pctMargPJ = 0;
        if(d.margem>=36.01) pctMargPJ = 1;
        else if(d.margem>=33.01) pctMargPJ = 0.5;
        else if(d.margem>=30) pctMargPJ = 0.25;
        p2Inferido = { pct:pctMargPJ, ok:pctMargPJ>0, gate:false,
          motivo: pctMargPJ>0
            ? "Margem "+formatPct(d.margem)+" → "+formatPct(pctMargPJ)
            : "Margem "+formatPct(d.margem)+" abaixo de 30%" };
        // Posit PJ
        var pctPositPJ = d.posit_pct>=80 ? 0.25 : 0;
        p3Inferido = { pct:pctPositPJ, ok:pctPositPJ>0, gate:false,
          motivo: pctPositPJ>0
            ? "Positivação "+formatPct(d.posit_pct)+" ≥ 80% = 0,25%"
            : "Positivação "+formatPct(d.posit_pct)+" abaixo de 80%" };
      }

      // Cross-check: soma dos pilares inferidos deve bater com Total%
      var totalInferido = (p1Inferido?p1Inferido.pct:0) + (p2Inferido?p2Inferido.pct:0) + (p3Inferido?p3Inferido.pct:0);
      // Tolerancia 0.1% (arredondamentos)
      if(Math.abs(totalInferido - d.total_pct) <= 0.15){
        inferiu = true; // OK, podemos confiar na inferencia
      } else {
        // Inferencia divergiu da planilha — mantem o comportamento legado
        p1Inferido = p2Inferido = p3Inferido = null;
        inferiu = false;
      }
    }

    var motivoZero = "";
    if(planilhaZerou && perfil==="CLT"){
      motivoZero = "Não atingiu gate de elegibilidade (Fat ≥ 70% e Posit ≥ 70%)";
    } else if(planilhaZerou){
      motivoZero = "Não atingiu critérios mínimos do mês";
    } else if(algumContam && !inferiu){
      motivoZero = "Detalhamento dos pilares indisponível — verifique a planilha";
    }

    // ── Faturamento ──
    var p1raw = d.p1_fat;
    var p1, p1desc, p1ok, p1contam;
    if(inferiu && p1Inferido){
      p1 = p1Inferido.pct;
      p1desc = p1Inferido.motivo;
      p1ok = p1Inferido.ok;
      p1contam = false;
    } else {
      p1 = (planilhaZerou || p1Contam) ? 0 : p1raw;
      p1desc = planilhaZerou
        ? motivoZero
        : (p1Contam
            ? "Valor inválido na planilha ("+formatPct(p1raw)+") — usando Total final"
            : (p1>0 ? formatPct(p1)+" sobre o faturamento" : "Sem premiação no pilar"));
      p1ok = p1>0;
      p1contam = p1Contam && !planilhaZerou;
    }
    pilares.push({
      nome:"Faturamento",
      pct: p1,
      desc: p1desc,
      ok: p1ok,
      contaminado: p1contam,
      gateOnly: !!(p1Inferido && p1Inferido.gate),
      base: fat, valor: fat*(p1/100),
      regra: regras.fat,
      tipoMetrica: "fat",
      valorMetrica: pctFat
    });

    // ── Margem ──
    var p2raw = d.p2_marg;
    var p2, p2desc, p2ok, p2contam;
    if(inferiu && p2Inferido){
      p2 = p2Inferido.pct;
      p2desc = p2Inferido.motivo;
      p2ok = p2Inferido.ok;
      p2contam = false;
    } else {
      p2 = (planilhaZerou || p2Contam) ? 0 : p2raw;
      p2desc = planilhaZerou
        ? "Margem do mês: "+formatPct(d.margem)+" — "+motivoZero
        : (p2Contam
            ? "Valor inválido na planilha ("+formatPct(p2raw)+") — usando Total final"
            : (p2>0 ? "Margem "+formatPct(d.margem)+" → "+formatPct(p2) : "Margem "+formatPct(d.margem)+" não atinge faixas = 0%"));
      p2ok = p2>0;
      p2contam = p2Contam && !planilhaZerou;
    }
    pilares.push({
      nome:"Margem Média",
      pct: p2,
      desc: p2desc,
      ok: p2ok,
      contaminado: p2contam,
      base: fat, valor: fat*(p2/100),
      regra: regras.marg,
      tipoMetrica: "marg",
      valorMetrica: d.margem
    });

    // ── Positivação ──
    var p3raw = d.p3_posit;
    var p3, p3desc, p3ok, p3contam;
    if(inferiu && p3Inferido){
      p3 = p3Inferido.pct;
      p3desc = p3Inferido.motivo;
      p3ok = p3Inferido.ok;
      p3contam = false;
    } else {
      p3 = (planilhaZerou || p3Contam) ? 0 : p3raw;
      p3desc = planilhaZerou
        ? "Positivação do mês: "+formatPct(d.posit_pct)+" — "+motivoZero
        : (p3Contam
            ? "Valor inválido na planilha ("+formatPct(p3raw)+") — usando Total final"
            : (p3>0 ? "Positivação "+formatPct(d.posit_pct)+" → "+formatPct(p3) : "Positivação "+formatPct(d.posit_pct)+" abaixo do mínimo = 0%"));
      p3ok = p3>0;
      p3contam = p3Contam && !planilhaZerou;
    }
    pilares.push({
      nome:"Positivação",
      pct: p3,
      desc: p3desc,
      ok: p3ok,
      contaminado: p3contam,
      gateOnly: !!(p3Inferido && p3Inferido.gate),
      base: fat, valor: fat*(p3/100),
      regra: regras.posit,
      tipoMetrica: "posit",
      valorMetrica: d.posit_pct
    });

    // Novos Clientes (R$ fixo) — esse pode ser pago mesmo com gates não batidos
    var p4r = d.p4_novos;
    pilares.push({
      nome:"Novos Clientes",
      pct: 0,
      desc: p4r>0 ? d.novos+" abertura(s) → R$ "+formatNum(p4r) : "Abaixo do mínimo ("+d.novos+" aberturas) = R$ 0",
      ok: p4r>0,
      base: 0, valor: p4r,
      tipo:"reais",
      regra: regras.novos,
      tipoMetrica: "novos",
      valorMetrica: d.novos
    });
  }

  // Bonus extras vindos da planilha
  var bonus = [];
  // OVER META
  if(OVER_META_META[d.nome] !== undefined){
    var metaOver = OVER_META_META[d.nome];
    var falta = Math.max(0, metaOver - fat);
    var pctOver = metaOver>0 ? Math.min(100, Math.round((fat/metaOver)*100)) : 0;
    var atingiu = d.over_meta>0; // planilha calculou um valor
    bonus.push({
      tipo:"OVER_META",
      titulo:"🚀 Over Meta",
      atingiu: atingiu,
      valor: d.over_meta || 0,
      meta: metaOver,
      atual: fat,
      falta: falta,
      pctProgresso: pctOver,
      margem: d.margem,
      regra: "Bater R$ "+formatNum(metaOver)+" em faturamento + margem ≥ "+OVER_META_MARGEM_MIN+"% = R$ "+formatNum(OVER_META_BONUS),
      detalhe: atingiu
        ? "Conquistou! Faturou "+formatNum(fat)+" com margem "+formatPct(d.margem)+"%."
        : (falta>0
            ? "Faltam R$ "+formatNum(falta)+" de faturamento" + (d.margem<OVER_META_MARGEM_MIN?" · Margem atual "+formatPct(d.margem)+"% (mín. "+OVER_META_MARGEM_MIN+"%)":"")
            : "Faturamento atingido. Margem "+formatPct(d.margem)+"% (mín. "+OVER_META_MARGEM_MIN+"%) — verifique cálculo na planilha")
    });
  }
  // META GLOBAL
  if(META_GLOBAL_PARTICIPA[d.nome]){
    bonus.push({
      tipo:"META_GLOBAL",
      titulo:"🌐 Meta Global do Time",
      atingiu: d.meta_global>0,
      valor: d.meta_global || 0,
      regra: "Time bater +R$ 50K acima da meta = R$ 1.000 · +R$ 100K = R$ 2.200",
      detalhe: d.meta_global>0
        ? "Time atingiu o degrau — bônus R$ "+formatNum(d.meta_global)
        : "Time ainda não atingiu o degrau de +R$ 50K acima da meta global"
    });
  }

  // Total = soma dos pilares (sempre em R$, ja que mistura % e R$ fixo)
  var totalPilares = pilares.reduce(function(a,p){ return a + (p.valor||0); }, 0);
  // Cross-check: se planilha tem premio_sheet, usa ele como verdade
  var premioFinal = d.premio_sheet>0 ? d.premio_sheet : totalPilares;
  // Soma bonus
  var totalBonus = bonus.reduce(function(a,b){ return a + (b.valor||0); }, 0);

  // ── Pos-processamento: enriquece cada pilar com barra de progresso + status ──
  pilares.forEach(function(p){
    // Arredonda valorMetrica para evitar floats ugly tipo 28.99999996
    if(typeof p.valorMetrica === "number"){
      p.valorMetrica = Math.round(p.valorMetrica * 100) / 100;
    }
    var tipoBarra = p.tipoMetrica==="novos" ? "novos_aberturas" : p.tipoMetrica;
    var tiers = _getTiers(perfil, tipoBarra);
    var valor = p.valorMetrica || 0;

    // CASO ESPECIAL 1: Faturamento PJ (faixa única "1% sobre tudo")
    // → mostra progresso vs meta de faturamento (% Fat vs Meta)
    if(p.tipoMetrica === "fat" && (perfil === "PJ" || perfil === "KA-PJ")){
      var pctMeta = p.valorMetrica||0; // % do faturamento vs meta
      p.barra = {
        pct: Math.min(100, pctMeta),
        falta: Math.max(0, 100-pctMeta),
        faltaTxt: pctMeta>=100 ? "Meta superada!" : "Faltam "+(100-pctMeta).toFixed(1).replace(".",",")+"pp para a meta",
        atualLabel: tiers[0] ? tiers[0].label : "1% sobre faturamento",
        proxLabel: pctMeta>=100 ? null : "Bater 100% da meta",
        maxAtingido: pctMeta>=100
      };
    }
    // CASO ESPECIAL 1B: Faturamento/Positivação CLT (gate de elegibilidade)
    // → barra mostra distância para o gate de 70%
    else if(perfil === "CLT" && (p.tipoMetrica === "fat" || p.tipoMetrica === "posit")){
      var gate = 70;
      var pctVal = valor;
      var pctBarra = Math.round(Math.min(100, (pctVal/gate)*100));
      var passou = pctVal >= gate;
      p.barra = {
        pct: passou ? 100 : pctBarra,
        falta: passou ? 0 : (gate - pctVal),
        faltaTxt: passou
          ? "Gate liberado ("+formatPct(pctVal)+" ≥ 70%)"
          : "Faltam "+(gate-pctVal).toFixed(1).replace(".",",")+"pp para liberar o gate",
        atualLabel: passou ? "Gate ≥70% liberado" : "Abaixo do gate de 70%",
        proxLabel: passou ? null : "Bater 70% para liberar pilares",
        maxAtingido: false // gate não é "máximo", é só liberação
      };
    }
    // CASO ESPECIAL 2: Trocas/Avarias (faixas decrescentes — ficar abaixo é melhor)
    // → barra mostra "distância do limite ruim"
    else if(p.tipoMetrica === "trocas"){
      // Limite ruim = 5% (acima disso perde tudo)
      var limiteRuim = 5;
      var pctSeguranca = Math.round(Math.max(0, Math.min(100, ((limiteRuim - valor)/limiteRuim)*100)));
      var lblFaixaAtual = valor<=2 ? "Faixa segura (≤2%)" : valor<=5 ? "Atenção (2-5%)" : "Crítico (>5%)";
      var lblProx = valor<=2 ? null : (valor<=5 ? "Voltar para ≤2%" : "Reduzir para ≤5%");
      p.barra = {
        pct: pctSeguranca,
        falta: 0,
        faltaTxt: valor<=2 ? "Margem de segurança · "+pctSeguranca.toFixed(0)+"%" : (lblProx||""),
        atualLabel: lblFaixaAtual,
        proxLabel: lblProx,
        maxAtingido: valor<=2
      };
    }
    // CASO PADRÃO: faixas crescentes
    else {
      p.barra = _barraProgresso(p.tipoMetrica, valor, tiers);
    }

    // Determina status
    var limiar = QUASE_LA[p.tipoMetrica] || 0;
    var distancia = p.barra.falta;
    if(p.contaminado){
      // Pilar com dado contaminado na planilha — neutro (azul)
      p.status = "blue";
    } else if(p.gateOnly){
      // Pilar de gate (Faturamento/Positivação CLT) — verde se liberado, vermelho se não
      p.status = p.ok ? "green" : "red";
    } else if(p.ok){
      p.status = "green";
    } else if(distancia > 0 && distancia <= limiar){
      p.status = "yellow";
    } else {
      p.status = "red";
    }
    // Cor do status
    p.cor = COR_STATUS[p.status];
    if(p.contaminado){
      p.badge = { txt:"Verificar", icon:"!" };
    } else if(p.gateOnly){
      p.badge = p.ok ? { txt:"Liberado", icon:"✓" } : { txt:"Não liberado", icon:"○" };
    } else {
      p.badge = BADGE_INFO[p.status];
    }
  });

  return {
    pilares: pilares,
    bonus: bonus,
    totalPilares: premioFinal,
    totalBonus: totalBonus,
    premio: premioFinal + totalBonus,
    fat: fat,
    pctFat: pctFat,
    perfil: perfil,
    totalPct: d.total_pct
  };
}

// Helpers de formatação
function formatPct(v){
  if(v===0||!v) return "0%";
  // Se for inteiro, sem decimais
  if(Math.abs(v - Math.round(v)) < 0.01) return Math.round(v)+"%";
  return v.toFixed(2).replace(".",",")+"%";
}
function formatNum(v){
  return Math.abs(parseFloat(v)||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
}

// Limiares de "Quase lá" (faltando pra próxima faixa)
var QUASE_LA = {
  marg:    2,    // 2 pontos percentuais
  posit:   5,    // 5 pontos percentuais
  fat:     10,   // 10% da meta (em pontos da %)
  novos:   2     // 2 aberturas
};

// Encontra a faixa atual e a próxima dado um valor e a config de tiers
function _proxFaixa(tiers, valorAtual){
  if(!tiers || !tiers.length) return { atual:null, prox:null, idx:-1 };
  var idx = -1;
  for(var i=tiers.length-1; i>=0; i--){
    if(valorAtual >= tiers[i].min){ idx = i; break; }
  }
  var atual = idx>=0 ? tiers[idx] : null;
  var prox  = (idx>=0 && idx<tiers.length-1) ? tiers[idx+1] : null;
  return { atual:atual, prox:prox, idx:idx };
}

// Status do pilar: 'green' (atingiu) | 'yellow' (quase la) | 'red' (longe) | 'blue' (bonus)
function statusPilar(opts){
  // opts: { tipo, atingiu, valorAtual, distQuaseLa }
  if(opts.atingiu) return "green";
  if(opts.distQuaseLa !== undefined && opts.distQuaseLa <= opts.limiar) return "yellow";
  return "red";
}

// Cores por status
var COR_STATUS = {
  green:  { primaria:"#10b981", bg:"rgba(16,185,129,0.08)", bd:"rgba(16,185,129,0.25)", barra:"#10b981" },
  yellow: { primaria:"#f59e0b", bg:"rgba(245,158,11,0.08)", bd:"rgba(245,158,11,0.28)", barra:"#f59e0b" },
  red:    { primaria:"#e63329", bg:"rgba(230,51,41,0.06)",  bd:"rgba(230,51,41,0.22)",  barra:"#e63329" },
  blue:   { primaria:"#3b82f6", bg:"rgba(59,130,246,0.06)", bd:"rgba(59,130,246,0.22)", barra:"#3b82f6" }
};

// Texto e ícone do badge de status
var BADGE_INFO = {
  green:  { txt:"Atingido",     icon:"✓" },
  yellow: { txt:"Quase lá",     icon:"⚡" },
  red:    { txt:"Não atingiu",  icon:"○" },
  blue:   { txt:"Bônus",        icon:"★" }
};

// Calcula barra de progresso entre faixa atual e proxima
// Retorna: { pct, falta, faltaTxt, atualLabel, proxLabel }
function _barraProgresso(tipo, valor, tiers){
  var pf = _proxFaixa(tiers, valor);
  if(!pf.prox){
    // Já está na faixa máxima
    return {
      pct: 100,
      falta: 0,
      faltaTxt: "Faixa máxima atingida",
      atualLabel: pf.atual ? pf.atual.label : "—",
      proxLabel: null,
      maxAtingido: true
    };
  }
  var minAtual = pf.atual ? pf.atual.min : 0;
  var minProx  = pf.prox.min;
  var span = minProx - minAtual;
  var prog = valor - minAtual;
  var pct = span>0 ? Math.max(0, Math.min(100, Math.round((prog/span)*100))) : 0;
  var falta = Math.max(0, minProx - valor);
  var faltaTxt = "";
  if(tipo==="marg" || tipo==="posit" || tipo==="fat" || tipo==="trocas"){
    faltaTxt = "Falta "+falta.toFixed(1).replace(".",",")+"pp";
  } else if(tipo==="novos"){
    faltaTxt = "Falta "+Math.ceil(falta)+" abertura(s)";
  }
  return {
    pct: pct,
    falta: falta,
    faltaTxt: faltaTxt,
    atualLabel: pf.atual ? pf.atual.label : "—",
    proxLabel: pf.prox.label,
    maxAtingido: false
  };
}

// Helper: pega tiers de um perfil x tipo (com fallback gracioso)
function _getTiers(perfil, tipo){
  return (TIERS[perfil] && TIERS[perfil][tipo]) || [];
}

// Renderiza um pilar individual (reusado pelo card + modal)

  opts = opts || {};

  var c = p.cor || COR_STATUS.red;
  var b = p.badge || BADGE_INFO.red;

  // Valor principal: % com R$ embaixo, OU R$ direto se for "reais"
  var valorPrincipalHTML, valorBaseHTML;
  if(p.gateOnly){
    // Pilar de gate (CLT Faturamento/Positivação): nao paga, so libera ou nao
    var statusTxt = p.ok ? "Liberado" : "Bloqueado";
    var statusEmoji = p.ok ? "✓" : "✗";
    valorPrincipalHTML =
      '<div style="font-family:var(--fh);font-size:'+(compact?'1.4rem':'1.7rem')+';font-weight:800;color:'+c.primaria+';line-height:1;letter-spacing:-0.02em;display:flex;align-items:baseline;gap:8px">'+
        '<span style="font-size:0.85em">'+statusEmoji+'</span>'+
        '<span>'+statusTxt+'</span>'+
      '</div>'+
      '<div style="font-family:var(--fh);font-size:0.78rem;font-weight:500;color:var(--mu);margin-top:6px">Pilar não remunera — gate de elegibilidade</div>';
    valorBaseHTML = '';
  } else if(p.tipo === "reais"){
    // Novos Clientes: R$ direto, sem %
    valorPrincipalHTML =
      '<div style="font-family:var(--fh);font-size:'+(compact?'1.5rem':'2rem')+';font-weight:800;color:'+c.primaria+';line-height:1;letter-spacing:-0.02em">'+
        (p.valor>0?'+R$ '+formatNum(p.valor):'R$ 0,00')+
      '</div>';
    valorBaseHTML = p.valor>0
      ? '<div style="font-size:0.7rem;color:var(--mu);margin-top:6px"><span style="opacity:0.6">ⓘ</span> '+(p.valorMetrica||0)+' aberturas × R$ '+(p.valor/Math.max(1,p.valorMetrica||1)).toFixed(0)+'</div>'
      : '';
  } else {
    // Pilar normal: % grande + R$
    valorPrincipalHTML =
      '<div style="font-family:var(--fh);font-size:'+(compact?'1.5rem':'2rem')+';font-weight:800;color:'+c.primaria+';line-height:1;letter-spacing:-0.02em">'+
        (p.pct>0 ? '+'+formatPct(p.pct) : '0%')+
      '</div>'+
      (p.pct>0
        ? '<div style="font-family:var(--fh);font-size:'+(compact?'0.85rem':'1rem')+';font-weight:600;color:var(--tx);margin-top:4px">= R$ '+formatNum(p.valor)+'</div>'
        : '');
    valorBaseHTML = p.pct>0
      ? '<div style="font-size:0.7rem;color:var(--mu);margin-top:6px"><span style="opacity:0.6">ⓘ</span> Base: R$ '+formatNum(p.base)+' (faturamento)</div>'
      : '';
  }

  // Contexto da métrica
  var ctxLabel = "";
  if(p.tipoMetrica==="marg")       ctxLabel = "Margem atual: <strong style=\"color:var(--tx)\">"+formatPct(p.valorMetrica)+"</strong>";
  else if(p.tipoMetrica==="posit") ctxLabel = "Positivação atual: <strong style=\"color:var(--tx)\">"+formatPct(p.valorMetrica)+"</strong>";
  else if(p.tipoMetrica==="fat")   ctxLabel = "Faturamento atual: <strong style=\"color:var(--tx)\">"+formatPct(p.valorMetrica)+"</strong> da meta";
  else if(p.tipoMetrica==="novos") ctxLabel = "Aberturas no mês: <strong style=\"color:var(--tx)\">"+(p.valorMetrica||0)+"</strong>";
  else if(p.tipoMetrica==="trocas")ctxLabel = "Trocas no mês: <strong style=\"color:var(--tx)\">"+formatPct(p.valorMetrica)+"</strong>";

  // Barra de progresso (sempre visível)
  var barraHTML = "";
  if(p.barra){
    var barraColor = p.status==="green" ? "#10b981" : (p.status==="yellow" ? "#f59e0b" : "#6b7280");
    var faltaTxt = p.barra.maxAtingido
      ? '<span style="color:#10b981;font-weight:600">★ Faixa máxima atingida</span>'
      : (p.barra.proxLabel
          ? '<span style="color:var(--mu)">Próxima: <span style="color:var(--tx);font-weight:600">'+p.barra.proxLabel+'</span> · '+p.barra.faltaTxt+'</span>'
          : '<span style="color:var(--mu)">'+p.barra.atualLabel+'</span>');
    barraHTML =
      '<div style="margin-top:14px;padding-top:12px;border-top:1px dashed rgba(255,255,255,0.06)">'+
        '<div style="height:5px;background:var(--s2);border-radius:99px;overflow:hidden;margin-bottom:8px;position:relative">'+
          '<div style="width:'+(p.barra.maxAtingido?100:p.barra.pct)+'%;height:100%;background:linear-gradient(90deg, '+barraColor+'aa, '+barraColor+');border-radius:99px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)"></div>'+
        '</div>'+
        '<div style="font-size:0.65rem;line-height:1.5">'+faltaTxt+'</div>'+
      '</div>';
  }

  // Regra discreta no rodapé
  var regraHTML = p.regra
    ? '<div style="margin-top:12px;padding:8px 10px;background:rgba(255,255,255,0.02);border-left:2px solid rgba(255,255,255,0.08);border-radius:3px;font-size:0.62rem;color:var(--mu);line-height:1.55">'+
        '<span style="opacity:0.7;font-weight:700;letter-spacing:0.4px;margin-right:4px">REGRA</span>'+p.regra+
      '</div>'
    : '';

  // Card layout
  return ''+
    '<div style="background:'+c.bg+';border:1px solid '+c.bd+';border-radius:14px;padding:'+(compact?'14px 16px':'18px 20px')+';position:relative;transition:transform 0.2s, border-color 0.2s">'+
      // Header: nome + badge
      '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px">'+
        '<div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">'+
          '<span style="font-family:var(--fh);font-size:'+(compact?'0.85rem':'0.92rem')+';font-weight:700;color:var(--tx);letter-spacing:-0.01em">'+p.nome+'</span>'+
        '</div>'+
        '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;background:'+c.primaria+'22;color:'+c.primaria+';font-size:0.62rem;font-weight:700;letter-spacing:0.3px;text-transform:uppercase;flex-shrink:0">'+
          '<span style="font-size:0.7rem">'+b.icon+'</span>'+b.txt+
        '</span>'+
      '</div>'+
      // Valor principal grande
      valorPrincipalHTML+
      valorBaseHTML+
      // Contexto da métrica
      (ctxLabel ? '<div style="font-size:0.78rem;color:var(--mu);margin-top:10px;line-height:1.5">'+ctxLabel+'</div>' : '')+
      // Barra de progresso
      barraHTML+
      // Regra discreta
      regraHTML+
    '</div>';
}

// ════════════════════════════════════════════════════════════════════
// CARD COMPLETO (vendedor ou detalhe modal)
// ════════════════════════════════════════════════════════════════════
function renderRemCardCompleto(nome, opts){
  opts = opts || {};
  var mesChave = opts.mesChave || MES_SELECIONADO || "atual";
  var d = getDadosPorMes(nome, mesChave);
  var r = calcRemuneracao(d);

  var dm = DM.find(function(v){return v.nome&&v.nome.toLowerCase()===nome.toLowerCase();});
  var av = dm?dm.av:"avLB";
  var siglaDisp = (dm && dm.sigla) || SG[nome] || nome.substring(0,2).toUpperCase();

  // Pilares em grid 2 colunas
  var pilaresHTML = r.pilares.map(function(p){ return renderPilarHTML(p); }).join('');

  // Bonus cards
  var bonusHTML = (r.bonus||[]).map(function(b){
    var c = b.atingiu ? COR_STATUS.green : COR_STATUS.blue;
    var statusBadge = b.atingiu ? BADGE_INFO.green : BADGE_INFO.blue;
    var icon = b.tipo==="OVER_META" ? "🚀" : "🌐";

    var progressoHTML = "";
    if(b.tipo==="OVER_META"){
      var pctProg = Math.min(100, b.pctProgresso||0);
      var corMargemOk = b.margem >= OVER_META_MARGEM_MIN;
      var corMargem = corMargemOk ? "#10b981" : "#f59e0b";
      progressoHTML =
        '<div style="margin-top:14px">'+
          '<div style="display:flex;justify-content:space-between;align-items:baseline;font-size:0.72rem;color:var(--mu);margin-bottom:6px">'+
            '<span><strong style="color:var(--tx)">R$ '+formatNum(b.atual)+'</strong> de R$ '+formatNum(b.meta)+'</span>'+
            '<span style="font-family:var(--fh);font-weight:800;color:'+c.primaria+';font-size:0.95rem">'+pctProg+'%</span>'+
          '</div>'+
          '<div style="height:6px;background:var(--s2);border-radius:99px;overflow:hidden;margin-bottom:8px">'+
            '<div style="width:'+pctProg+'%;height:100%;background:linear-gradient(90deg, '+c.primaria+'aa, '+c.primaria+');border-radius:99px;transition:width 0.6s"></div>'+
          '</div>'+
          '<div style="display:flex;align-items:center;gap:6px;font-size:0.7rem">'+
            '<span style="color:'+corMargem+';font-weight:600">●</span>'+
            '<span style="color:var(--mu)">Margem atual: <strong style="color:'+corMargem+'">'+formatPct(b.margem)+'</strong> (mín. '+OVER_META_MARGEM_MIN+'%)</span>'+
          '</div>'+
        '</div>';
    }

    var valorBonus = b.atingiu
      ? '<div style="font-family:var(--fh);font-size:1.8rem;font-weight:800;color:'+c.primaria+';line-height:1;letter-spacing:-0.02em">+R$ '+formatNum(b.valor)+'</div>'
      : '<div style="font-family:var(--fh);font-size:1.2rem;font-weight:700;color:var(--mu);line-height:1">Não atingido</div>';

    return ''+
      '<div style="background:'+c.bg+';border:1px solid '+c.bd+';border-radius:14px;padding:18px 20px;position:relative">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px">'+
          '<div style="display:flex;align-items:center;gap:8px">'+
            '<span style="font-size:1.1rem">'+icon+'</span>'+
            '<span style="font-family:var(--fh);font-size:0.92rem;font-weight:700;color:var(--tx);letter-spacing:-0.01em">'+b.titulo.replace(/^[🚀🌐]\s*/,'')+'</span>'+
          '</div>'+
          '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;background:'+c.primaria+'22;color:'+c.primaria+';font-size:0.62rem;font-weight:700;letter-spacing:0.3px;text-transform:uppercase">'+
            '<span style="font-size:0.7rem">'+statusBadge.icon+'</span>'+statusBadge.txt+
          '</span>'+
        '</div>'+
        valorBonus+
        '<div style="font-size:0.78rem;color:var(--mu);margin-top:10px;line-height:1.5">'+b.detalhe+'</div>'+
        progressoHTML+
        '<div style="margin-top:12px;padding:8px 10px;background:rgba(255,255,255,0.02);border-left:2px solid '+c.primaria+'66;border-radius:3px;font-size:0.62rem;color:var(--mu);line-height:1.55">'+
          '<span style="opacity:0.7;font-weight:700;letter-spacing:0.4px;margin-right:4px">REGRA</span>'+b.regra+
        '</div>'+
      '</div>';
  }).join('');

  // Header — destaque no nome + perfil + faturamento
  // Tipografia arejada: line-height generoso, letter-spacing positivo no nome,
  // hierarquia clara entre os 3 blocos (avatar / nome / faturamento)
  var headerHTML =
    '<div style="display:grid;grid-template-columns:auto 1fr auto;gap:24px;align-items:center;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.08)">'+
      // Avatar maior e com leve glow
      '<div class="mav2 '+av+'" style="width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:1.15rem;font-weight:700;letter-spacing:0.02em;flex-shrink:0;box-shadow:0 0 0 1px rgba(255,255,255,0.08)">'+siglaDisp+'</div>'+
      // Bloco central: nome + perfil + subtitulo
      '<div style="min-width:0">'+
        '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">'+
          // NOME — hierarquia maxima, letter-spacing leve negativo (bom para fontes grandes)
          '<div style="font-family:var(--fh);font-size:2rem;font-weight:700;color:var(--tx);letter-spacing:-0.015em;line-height:1.1">'+nome+'</div>'+
          // Tag de perfil
          '<span style="font-family:var(--fh);font-size:0.62rem;font-weight:700;color:var(--mu);background:var(--s2);padding:5px 12px;border-radius:99px;text-transform:uppercase;letter-spacing:0.08em;border:1px solid var(--br)">'+r.perfil+'</span>'+
        '</div>'+
        // Subtitulo arejado
        '<div style="font-size:0.85rem;color:var(--mu);margin-top:8px;letter-spacing:0.005em;font-weight:400">Remuneração variável <span style="opacity:0.4;margin:0 6px">·</span> '+(d.mes||new Date().toLocaleDateString("pt-BR",{month:"long",year:"numeric"}))+'</div>'+
      '</div>'+
      // Bloco direito: faturamento (CTA visual)
      '<div style="text-align:right;padding-left:24px;border-left:1px solid rgba(255,255,255,0.06)">'+
        '<div style="font-family:var(--fh);font-size:0.62rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.12em;font-weight:600;margin-bottom:6px">Faturamento</div>'+
        '<div style="font-family:var(--fh);font-size:1.55rem;font-weight:700;color:var(--tx);letter-spacing:-0.015em;line-height:1.05">'+fv(d.faturamento)+'</div>'+
        (d.meta_fat>0
          ? '<div style="font-size:0.78rem;color:var(--mu);margin-top:6px;letter-spacing:0.005em">de '+fv(d.meta_fat)+' <span style="opacity:0.4;margin:0 4px">·</span> <span style="font-weight:700;color:'+(r.pctFat>=100?'#10b981':r.pctFat>=70?'#f59e0b':'#e63329')+'">'+r.pctFat+'%</span></div>'
          : '')+
      '</div>'+
    '</div>';

  // Total — destaque máximo
  var totalHTML =
    '<div style="background:linear-gradient(135deg, rgba(16,185,129,0.12), rgba(16,185,129,0.04));border:1px solid rgba(16,185,129,0.3);border-radius:18px;padding:28px 32px;margin-top:28px;position:relative;overflow:hidden">'+
      '<div style="position:absolute;top:-20px;right:-20px;width:180px;height:180px;background:radial-gradient(circle, rgba(16,185,129,0.18), transparent 70%);pointer-events:none"></div>'+
      '<div style="display:flex;align-items:flex-end;justify-content:space-between;gap:24px;flex-wrap:wrap;position:relative">'+
        '<div style="flex:1;min-width:240px">'+
          '<div style="font-family:var(--fh);font-size:0.7rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.14em;font-weight:700;margin-bottom:10px">Total da remuneração variável</div>'+
          '<div style="font-family:var(--fh);font-size:2.8rem;font-weight:700;color:#10b981;line-height:1;letter-spacing:-0.025em">'+fv(r.premio)+'</div>'+
          (r.totalBonus>0
            ? '<div style="font-size:0.78rem;color:var(--mu);margin-top:12px;letter-spacing:0.005em">'+fv(r.totalPilares)+' (pilares) <span style="opacity:0.4;margin:0 6px">+</span> '+fv(r.totalBonus)+' (bônus)</div>'
            : '')+
          (d.observacao?'<div style="font-size:0.78rem;color:var(--mu);margin-top:10px;font-style:italic;line-height:1.5">Obs: '+d.observacao+'</div>':'')+
        '</div>'+
        '<div style="text-align:right;padding-left:24px;border-left:1px solid rgba(16,185,129,0.2)">'+
          '<div style="font-family:var(--fh);font-size:0.62rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.12em;font-weight:600;margin-bottom:6px">% sobre faturamento</div>'+
          '<div style="font-family:var(--fh);font-size:1.9rem;font-weight:700;color:#10b981;letter-spacing:-0.015em;line-height:1">'+formatPct(r.totalPct)+'</div>'+
          '<div style="font-size:0.7rem;color:var(--mu);margin-top:6px;opacity:0.7;letter-spacing:0.005em">vindo da planilha</div>'+
        '</div>'+
      '</div>'+
    '</div>';

  return ''+
    '<div style="background:var(--sf);border:1px solid var(--b2);border-radius:18px;padding:'+(opts.modal?'28px':'24px')+';box-shadow:0 4px 24px rgba(0,0,0,0.2)">'+
      headerHTML +
      '<div style="margin-bottom:10px;font-size:0.66rem;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:0.7px">Pilares de remuneração</div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:12px">'+pilaresHTML+'</div>'+
      (bonusHTML
        ? '<div style="margin-top:24px;margin-bottom:10px;font-size:0.66rem;font-weight:700;color:var(--mu2);text-transform:uppercase;letter-spacing:0.7px">Bônus extras</div>'+
          '<div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));gap:12px">'+bonusHTML+'</div>'
        : '')+
      totalHTML +
      // Painel diagnóstico expansível (fica fechado por padrão)
      '<details style="margin-top:14px;background:rgba(255,255,255,0.02);border:1px solid var(--br);border-radius:8px;font-size:0.7rem">'+
        '<summary style="padding:10px 14px;cursor:pointer;color:var(--mu);user-select:none;list-style:none;display:flex;align-items:center;justify-content:space-between">'+
          '<span><span style="opacity:0.7">🔍</span> Diagnóstico — valores vindos da planilha</span>'+
          '<span style="font-size:0.62rem;opacity:0.6">clique para expandir</span>'+
        '</summary>'+
        '<div style="padding:12px 14px;border-top:1px dashed var(--br);font-family:var(--fh);font-size:0.7rem;line-height:1.7;color:var(--mu)">'+
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 16px">'+
            '<div><span style="opacity:0.7">Faturamento (col C):</span> <strong style="color:var(--tx)">'+fv(d.faturamento)+'</strong></div>'+
            '<div><span style="opacity:0.7">Meta (col D):</span> <strong style="color:var(--tx)">'+fv(d.meta_fat)+'</strong></div>'+
            '<div><span style="opacity:0.7">% Fat (col E):</span> <strong style="color:var(--tx)">'+formatPct(d.pct_fat)+'</strong></div>'+
            '<div><span style="opacity:0.7">Margem (col F):</span> <strong style="color:var(--tx)">'+formatPct(d.margem)+'</strong></div>'+
            '<div><span style="opacity:0.7">Positivação (col G):</span> <strong style="color:var(--tx)">'+formatPct(d.posit_pct)+'</strong></div>'+
            '<div><span style="opacity:0.7">Novos (col H):</span> <strong style="color:var(--tx)">'+d.novos+'</strong></div>'+
            '<div><span style="opacity:0.7">P1 Fat% (col J):</span> <strong style="color:var(--tx)">'+formatPct(d.p1_fat)+'</strong></div>'+
            '<div><span style="opacity:0.7">P2 Marg% (col K):</span> <strong style="color:var(--tx)">'+formatPct(d.p2_marg)+'</strong></div>'+
            '<div><span style="opacity:0.7">P3 Posit% (col L):</span> <strong style="color:var(--tx)">'+formatPct(d.p3_posit)+'</strong></div>'+
            '<div><span style="opacity:0.7">P4 Novos% (col M):</span> <strong style="color:var(--tx)">'+(d.p4_novos>0?'R$ '+formatNum(d.p4_novos):formatPct(d.p4_novos))+'</strong></div>'+
            '<div><span style="opacity:0.7">Total % (col N):</span> <strong style="color:var(--tx)">'+formatPct(d.total_pct)+'</strong></div>'+
            '<div><span style="opacity:0.7;color:#10b981">Prêmio R$ (col O):</span> <strong style="color:#10b981">'+fv(d.premio_sheet)+'</strong></div>'+
            '<div><span style="opacity:0.7">Tipo (col P):</span> <strong style="color:var(--tx)">'+d.tipo+'</strong></div>'+
            '<div><span style="opacity:0.7">Mês (col B):</span> <strong style="color:var(--tx)">'+d.mes+'</strong></div>'+
          '</div>'+
          '<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--br);font-size:0.65rem;opacity:0.7">'+
            'Se algum valor acima estiver desatualizado, faça <kbd style="background:var(--s2);padding:1px 6px;border-radius:3px;border:1px solid var(--br);font-size:0.62rem">Ctrl+Shift+R</kbd> para forçar atualização do CSV. Sheets pode levar ~5min para republicar mudanças.'+
          '</div>'+
        '</div>'+
      '</details>'+
      '<div style="margin-top:12px;font-size:0.66rem;color:var(--mu2);text-align:center;opacity:0.7">'+
        'Cálculos automáticos vindos da planilha do time. Célio confirma os valores finais.'+
      '</div>'+
    '</div>';
}

// Wrapper compatível com chamadas antigas (renderiza dentro do #rem-card)
function renderRemCard(nome){
  var card = document.getElementById("rem-conteudo") || document.getElementById("rem-card");
  if(!card) return;
  // Tag de mês quando estiver vendo histórico
  var tag = "";
  if(MES_SELECIONADO !== "atual"){
    var bloco = HISTORICO_REMUNERACAO.find(function(h){ return h.mes === MES_SELECIONADO; });
    if(bloco){
      tag = '<div style="background:linear-gradient(90deg,rgba(160,124,246,0.18),rgba(77,142,245,0.10));border:1px solid rgba(160,124,246,0.35);border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;font-size:0.82rem;color:var(--tx)">'+
        '<span style="font-size:1.1rem">📅</span>'+
        '<span><strong>Visualizando histórico:</strong> '+bloco.label+' · dados consolidados (não muda mais)</span>'+
      '</div>';
    }
  }
  card.innerHTML = tag + renderRemCardCompleto(nome, { mesChave: MES_SELECIONADO });
}

// ════════════════════════════════════════════════════════════════════
// MINI-CARD (grid de gestores)
// ════════════════════════════════════════════════════════════════════
function renderMiniCard(nome){
  var d = getDadosPorMes(nome, MES_SELECIONADO);
  var r = calcRemuneracao(d);
  var dm = DM.find(function(v){return v.nome&&v.nome.toLowerCase()===nome.toLowerCase();});
  var av = dm?dm.av:"avLB";
  var siglaDisp = (dm && dm.sigla) || SG[nome] || nome.substring(0,2).toUpperCase();

  // Conta pilares atingidos
  var pAtingidos = r.pilares.filter(function(p){ return p.ok; }).length;
  var pTotal = r.pilares.length;
  var bonusGanhos = (r.bonus||[]).filter(function(b){ return b.atingiu; }).length;

  // Cor do prêmio (verde se > 0, mu se 0)
  var corPremio = r.premio>0 ? "#10b981" : "var(--mu)";

  // Indicador rápido: % faturado
  var corPctFat = r.pctFat>=100 ? "#10b981" : r.pctFat>=70 ? "#f59e0b" : "#e63329";

  return ''+
    '<div onclick="abrirModalRem(\''+nome+'\')" style="background:var(--sf);border:1px solid var(--br);border-radius:14px;padding:18px;cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);position:relative;overflow:hidden" '+
        'onmouseover="this.style.borderColor=\'var(--b2)\';this.style.transform=\'translateY(-2px)\';this.style.boxShadow=\'0 8px 24px rgba(0,0,0,0.25)\'" '+
        'onmouseout="this.style.borderColor=\'var(--br)\';this.style.transform=\'translateY(0)\';this.style.boxShadow=\'none\'">'+
      // Header: avatar + nome + perfil
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">'+
        '<div class="mav2 '+av+'" style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0">'+siglaDisp+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-family:var(--fh);font-size:1rem;font-weight:800;color:var(--tx);letter-spacing:-0.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+nome+'</div>'+
          '<div style="font-size:0.6rem;color:var(--mu);font-weight:600;letter-spacing:0.3px;text-transform:uppercase;margin-top:2px">'+r.perfil+'</div>'+
        '</div>'+
      '</div>'+
      // Prêmio principal
      '<div style="margin-bottom:14px">'+
        '<div style="font-size:0.6rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:2px">Prêmio do mês</div>'+
        '<div style="font-family:var(--fh);font-size:1.5rem;font-weight:800;color:'+corPremio+';line-height:1;letter-spacing:-0.02em">'+fv(r.premio)+'</div>'+
      '</div>'+
      // Barra: % faturamento vs meta
      '<div style="margin-bottom:12px">'+
        '<div style="display:flex;justify-content:space-between;align-items:baseline;font-size:0.65rem;color:var(--mu);margin-bottom:4px">'+
          '<span>Faturamento</span>'+
          '<span style="font-weight:700;color:'+corPctFat+'">'+r.pctFat+'%</span>'+
        '</div>'+
        '<div style="height:4px;background:var(--s2);border-radius:99px;overflow:hidden">'+
          '<div style="width:'+Math.min(100,r.pctFat)+'%;height:100%;background:'+corPctFat+';border-radius:99px;transition:width 0.6s"></div>'+
        '</div>'+
      '</div>'+
      // Stats: pilares atingidos / bonus
      '<div style="display:flex;gap:8px;font-size:0.7rem">'+
        '<span style="color:var(--mu)"><strong style="color:#10b981;font-weight:700">'+pAtingidos+'/'+pTotal+'</strong> pilares</span>'+
        (r.bonus && r.bonus.length>0
          ? '<span style="color:var(--mu)">·</span><span style="color:var(--mu)"><strong style="color:#3b82f6;font-weight:700">'+bonusGanhos+'/'+r.bonus.length+'</strong> bônus</span>'
          : '')+
      '</div>'+
      // CTA
      '<div style="margin-top:14px;padding-top:12px;border-top:1px dashed rgba(255,255,255,0.06);font-size:0.7rem;color:var(--mu);display:flex;align-items:center;justify-content:space-between">'+
        '<span>Ver detalhes</span>'+
        '<span style="opacity:0.6">→</span>'+
      '</div>'+
    '</div>';
}

// ════════════════════════════════════════════════════════════════════
// MODAL FULL-SCREEN (Modo Gestor)
// ════════════════════════════════════════════════════════════════════
function abrirModalRem(nome){
  // Cria/reusa overlay
  var overlay = document.getElementById('rem-modal-overlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'rem-modal-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:9998;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;animation:remFadeIn 0.2s ease-out';
    overlay.onclick = function(e){ if(e.target===overlay) fecharModalRem(); };
    document.body.appendChild(overlay);

    // Injeta animação CSS uma vez
    if(!document.getElementById('rem-modal-styles')){
      var st = document.createElement('style');
      st.id = 'rem-modal-styles';
      st.textContent = '@keyframes remFadeIn{from{opacity:0}to{opacity:1}}@keyframes remSlideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}';
      document.head.appendChild(st);
    }
  }

  overlay.innerHTML = ''+
