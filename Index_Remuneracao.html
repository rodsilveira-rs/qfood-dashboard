// MINI-GRÁFICO SVG: barras de prêmio (últimos 6 meses) + linha de margem
// ════════════════════════════════════════════════════════════════════
function renderGraficoMensal(nome, opts){
  opts = opts || {};
  var compact = !!opts.compact;
  // Últimos 6 meses (do mais antigo pro mais recente, esquerda → direita)
  var historico = HISTORICO_REMUNERACAO.slice(0, 6).reverse();

  if(historico.length === 0){
    return '<div style="background:var(--sf);border:1px solid var(--br);border-radius:12px;padding:40px;text-align:center;color:var(--mu);font-size:0.85rem">Sem histórico para exibir gráficos ainda.</div>';
  }

  // Coleta dados do vendedor em cada mês
  var pontos = historico.map(function(h){
    var d = h.dados.find(function(x){ return x.nome.toLowerCase() === nome.toLowerCase(); });
    return {
      label: h.label.split('/')[0].substring(0,3), // "Abr"
      labelFull: h.label,
      premio: d ? (d.premio_sheet||0) : 0,
      faturamento: d ? (d.faturamento||0) : 0,
      meta: d ? (d.meta_fat||0) : 0,
      margem: d ? (d.margem||0) : 0,
      pct_fat: d ? (d.pct_fat||0) : 0
    };
  });

  var maxPremio = Math.max.apply(null, pontos.map(function(p){return p.premio;})) || 1;
  var maxMargem = Math.max.apply(null, pontos.map(function(p){return p.margem;})) || 1;

  var W = 600, H = compact?180:240, padL=50, padR=20, padT=20, padB=40;
  var bw = (W - padL - padR) / pontos.length;

  // Barras de prêmio
  var barras = pontos.map(function(p, i){
    var bh = (p.premio/maxPremio) * (H - padT - padB);
    var x = padL + i*bw + bw*0.18;
    var y = H - padB - bh;
    var w = bw*0.64;
    var cor = p.premio>0 ? "#10b981" : "#3a4360";
    var label = p.premio>0 ? "R$ "+(p.premio>=1000? (p.premio/1000).toFixed(1)+"k" : p.premio.toFixed(0)) : "—";
    return ''+
      '<g>'+
        '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+bh+'" fill="'+cor+'" rx="3" opacity="0.85">'+
          '<title>'+p.labelFull+'\nPrêmio: R$ '+p.premio.toLocaleString("pt-BR",{minimumFractionDigits:2})+'\nFaturamento: R$ '+p.faturamento.toLocaleString("pt-BR",{minimumFractionDigits:2})+'\nMargem: '+p.margem+'%'+'</title>'+
        '</rect>'+
        '<text x="'+(x+w/2)+'" y="'+(y-6)+'" text-anchor="middle" font-size="9" font-weight="700" fill="#eef1f8" font-family="Plus Jakarta Sans">'+label+'</text>'+
        '<text x="'+(padL+i*bw+bw/2)+'" y="'+(H-padB+16)+'" text-anchor="middle" font-size="10" fill="#8fa0c0" font-family="Plus Jakarta Sans" font-weight="600">'+p.label+'</text>'+
      '</g>';
  }).join('');

  // Linha de margem (sobreposta)
  var pathPts = pontos.map(function(p, i){
    var x = padL + i*bw + bw/2;
    var y = padT + (1 - p.margem/Math.max(maxMargem, 50)) * (H - padT - padB);
    return (i===0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
  }).join(' ');

  var pontosLinha = pontos.map(function(p, i){
    var x = padL + i*bw + bw/2;
    var y = padT + (1 - p.margem/Math.max(maxMargem, 50)) * (H - padT - padB);
    return ''+
      '<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="3.5" fill="#ffaa2b" stroke="var(--bg)" stroke-width="1.5">'+
        '<title>'+p.labelFull+': margem '+p.margem+'%</title>'+
      '</circle>';
  }).join('');

  // Eixo Y (esquerda) — escala do prêmio
  var ticks = [0, 0.5, 1].map(function(t){
    var y = H - padB - t*(H - padT - padB);
    var v = t*maxPremio;
    var label = v>=1000 ? "R$ "+(v/1000).toFixed(0)+"k" : "R$ "+v.toFixed(0);
    return ''+
      '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>'+
      '<text x="'+(padL-6)+'" y="'+(y+3)+'" text-anchor="end" font-size="9" fill="#5e718e" font-family="Plus Jakarta Sans">'+label+'</text>';
  }).join('');

  // Card wrapper com header
  var dm = DM.find(function(v){return v.nome&&v.nome.toLowerCase()===nome.toLowerCase();});
  var sigla = (dm && dm.sigla) || SG[nome] || nome.substring(0,2).toUpperCase();
  var av = dm?dm.av:"avLB";

  // Stats rápidas
  var totalAno = pontos.reduce(function(s,p){return s+p.premio;}, 0);
  var maxMes = pontos.reduce(function(m,p){ return p.premio>m.premio?p:m; }, pontos[0]);

  var headerCard = compact
    ? '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'+
        '<div class="mav2 '+av+'" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800">'+sigla+'</div>'+
        '<div style="flex:1;min-width:0">'+
          '<div style="font-family:var(--fh);font-size:0.95rem;font-weight:700">'+nome+'</div>'+
          '<div style="font-size:0.65rem;color:var(--mu)">Total: <strong style="color:#10b981">'+fv(totalAno)+'</strong></div>'+
        '</div>'+
      '</div>'
    : '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">'+
        '<div style="display:flex;align-items:center;gap:12px">'+
          '<div class="mav2 '+av+'" style="width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800">'+sigla+'</div>'+
          '<div>'+
            '<div style="font-family:var(--fh);font-size:1.1rem;font-weight:800">'+nome+'</div>'+
            '<div style="font-size:0.7rem;color:var(--mu)">Últimos '+pontos.length+' meses</div>'+
          '</div>'+
        '</div>'+
        '<div style="display:flex;gap:18px">'+
          '<div><div style="font-size:0.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px">Total</div><div style="font-family:var(--fh);font-size:1.1rem;font-weight:800;color:#10b981">'+fv(totalAno)+'</div></div>'+
          '<div><div style="font-size:0.65rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px">Melhor mês</div><div style="font-family:var(--fh);font-size:1.1rem;font-weight:800;color:var(--tx)">'+maxMes.label+' ('+fv(maxMes.premio)+')</div></div>'+
        '</div>'+
      '</div>';

  return ''+
    '<div class="cwrap" style="margin-bottom:14px">'+
      headerCard+
      '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">'+
        ticks+
        barras+
        '<path d="'+pathPts+'" fill="none" stroke="#ffaa2b" stroke-width="2" opacity="0.85"/>'+
        pontosLinha+
      '</svg>'+
      '<div style="display:flex;gap:14px;justify-content:center;margin-top:8px;font-size:0.7rem;color:var(--mu)">'+
        '<span style="display:flex;align-items:center;gap:5px"><i style="width:10px;height:10px;background:#10b981;border-radius:2px;display:inline-block"></i>Prêmio R$</span>'+
        '<span style="display:flex;align-items:center;gap:5px"><i style="width:10px;height:10px;background:#ffaa2b;border-radius:50%;display:inline-block"></i>Margem %</span>'+
      '</div>'+
    '</div>';
}

// Helper: card de KPI reutilizável
function kpiCard(label, valor, sub, cor){
  return ''+
    '<div style="background:var(--s2);border:1px solid var(--br);border-left:3px solid '+cor+';border-radius:10px;padding:14px 16px">'+
      '<div style="font-size:0.7rem;color:var(--mu);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-bottom:6px">'+label+'</div>'+
      '<div style="font-family:var(--fh);font-size:1.5rem;font-weight:800;color:'+cor+';line-height:1;letter-spacing:-0.02em">'+valor+'</div>'+
      '<div style="font-size:0.68rem;color:var(--mu);margin-top:5px">'+sub+'</div>'+
    '</div>';
}

// Inicializacao: carrega Meta + Remuneracao ao abrir a pagina
document.addEventListener("DOMContentLoaded", async function(){
  await loadMeta();
  loadRemuneracao();
});
</script>
