<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cotacao Q Food</title>
</head>
<body>
<h2 id="status">Carregando...</h2>
<pre id="out" style="background:#eee;padding:20px;font-size:14px;white-space:pre-wrap;word-break:break-all"></pre>

<script>
var out = document.getElementById('out');
var status = document.getElementById('status');

// Step 1: show raw URL info
out.textContent = 
  'URL completa: ' + window.location.href + '\n\n' +
  'search: ' + window.location.search + '\n' +
  'hash: ' + window.location.hash + '\n\n';

// Step 2: get ?d= param
var s = null;
try {
  s = new URLSearchParams(window.location.search).get('d');
} catch(e) {
  out.textContent += 'ERRO URLSearchParams: ' + e.message + '\n';
}

out.textContent += '?d= valor: ' + (s ? s.substring(0,50)+'...' : 'NULO/VAZIO') + '\n';
out.textContent += '?d= tamanho: ' + (s ? s.length : 0) + ' chars\n\n';

if (!s) {
  status.textContent = '❌ Sem dados na URL';
  out.textContent += 'PROBLEMA: Nenhum dado encontrado na URL.\nVerifique se o link esta completo.';
} else {
  // Step 3: try decode
  try {
    var b64 = s.replace(/-/g,'+').replace(/_/g,'/');
    var pad = (4 - b64.length % 4) % 4;
    if (pad) b64 += '===='.slice(0, pad);
    
    var decoded = decodeURIComponent(
      atob(b64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join('')
    );
    
    out.textContent += 'Decoded (primeiros 200 chars):\n' + decoded.substring(0,200) + '\n\n';
    
    var parsed = JSON.parse(decoded);
    out.textContent += 'JSON parsed OK!\n';
    out.textContent += 'Fornecedor: ' + (parsed.f || parsed.fornecedor || 'N/A') + '\n';
    out.textContent += 'Itens: ' + ((parsed.i || parsed.itens || []).length) + '\n';
    status.textContent = '✅ Dados recebidos com sucesso!';
    
  } catch(e) {
    out.textContent += 'ERRO no decode: ' + e.message + '\n';
    out.textContent += 'Stack: ' + e.stack;
    status.textContent = '❌ Erro ao decodificar';
  }
}
</script>
</body>
</html>
